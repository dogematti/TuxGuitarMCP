name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests (includes bridge-simulator integration tests)
        run: cargo test --workspace

  # The Java plugin needs TuxGuitar 2.0.1 jars to compile. CI for it lands
  # in Phase 3 (build TuxGuitar from the 2.0.1 tag once, cache the jars).
